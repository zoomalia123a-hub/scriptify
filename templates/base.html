<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VETERINARIA V.1</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
    <nav>
        <div class="logo">&#128008; <span>VETERINARIA</span> V.1</div>
        <div>
            <a href="{{ url_for('index') }}">Inicio</a>
            <a href="{{ url_for('listar_duenos') }}">Dueños</a>
            <a href="{{ url_for('listar_animales') }}">Animales</a>
            <a href="{{ url_for('listar_citas') }}">Citas</a>
        </div>
    </nav>

    <div class="container">
        {% with messages = get_flashed_messages(with_categories=true) %}
            {% if messages %}
                {% for category, message in messages %}
                    <div class="flash {{ category }}">{{ message }}</div>
                {% endfor %}
            {% endif %}
        {% endwith %}

        {% block content %}{% endblock %}
    </div>
</body>
</html>
