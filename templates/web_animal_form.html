{% extends "web_base.html" %}
{% block content %}
<div class="row justify-content-center">
  <div class="col-lg-8 col-md-10 col-12">
    <div class="card shadow-sm border-0 rounded-3">
      <div class="card-body">
        <h5 class="card-title fw-bold mb-3">{% if animal %}Editar Paciente{% else %}Nuevo Paciente{% endif %}</h5>
        <form method="POST">
          <div class="row g-2">
            <div class="col-md-6 mb-3">
              <label class="form-label small fw-semibold text-muted">Nombre</label>
              <input name="nombre" value="{{ animal.nombre if animal else '' }}" required class="form-control">
            </div>
            <div class="col-md-6 mb-3">
              <label class="form-label small fw-semibold text-muted">Especie</label>
              <select name="especie" class="form-select">
                <option value="Perro" {% if animal and animal.especie=='Perro' %}selected{% endif %}>Perro</option>
                <option value="Gato" {% if animal and animal.especie=='Gato' %}selected{% endif %}>Gato</option>
                <option value="Ave" {% if animal and animal.especie=='Ave' %}selected{% endif %}>Ave</option>
                <option value="Conejo" {% if animal and animal.especie=='Conejo' %}selected{% endif %}>Conejo</option>
                <option value="Roedor" {% if animal and animal.especie=='Roedor' %}selected{% endif %}>Roedor</option>
                <option value="Reptil" {% if animal and animal.especie=='Reptil' %}selected{% endif %}>Reptil</option>
                <option value="Otro" {% if animal and animal.especie=='Otro' %}selected{% endif %}>Otro</option>
              </select>
            </div>
          </div>
          <div class="row g-2">
            <div class="col-md-6 mb-3">
              <label class="form-label small fw-semibold text-muted">Raza</label>
              <input name="raza" value="{{ animal.raza if animal else '' }}" class="form-control">
            </div>
            <div class="col-md-6 mb-3">
              <label class="form-label small fw-semibold text-muted">Edad</label>
              <input name="edad" type="number" value="{{ animal.edad if animal else '' }}" class="form-control">
            </div>
          </div>
          <div class="row g-2">
            <div class="col-md-6 mb-3">
              <label class="form-label small fw-semibold text-muted">Peso (kg)</label>
              <input name="peso" type="number" step="0.1" value="{{ animal.peso if animal else '' }}" class="form-control">
            </div>
            <div class="col-md-6 mb-3">
              <label class="form-label small fw-semibold text-muted">Sexo</label>
              <select name="sexo" class="form-select">
                <option value="">Seleccionar</option>
                <option value="Macho" {% if animal and animal.sexo=='Macho' %}selected{% endif %}>Macho</option>
                <option value="Hembra" {% if animal and animal.sexo=='Hembra' %}selected{% endif %}>Hembra</option>
              </select>
            </div>
          </div>
          <div class="mb-3">
            <label class="form-label small fw-semibold text-muted">Color</label>
            <input name="color" value="{{ animal.color if animal else '' }}" class="form-control">
          </div>
          <div class="mb-3">
            <label class="form-label small fw-semibold text-muted">Due&ntilde;o</label>
            <select name="id_dueno" required class="form-select">
              {% for d in duenos %}
              <option value="{{ d.id }}" {% if animal and animal.id_dueno==d.id %}selected{% endif %}>{{ d.nombre }}</option>
              {% endfor %}
            </select>
          </div>
          <div class="d-flex gap-2">
            <button type="submit" class="btn btn-success">Guardar</button>
            <a href="/animales" class="btn btn-outline-secondary">Cancelar</a>
          </div>
        </form>
      </div>
    </div>
  </div>
</div>
{% endblock %}
