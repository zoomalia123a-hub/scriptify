<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SCRIPTYFY - Sistema Veterinario</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:'Segoe UI',Arial,sans-serif}
body{background:#f0f4f8}
nav{background:#1abc9c;color:white;padding:12px 24px;display:flex;align-items:center;gap:20px;flex-wrap:wrap}
nav a{color:white;text-decoration:none;font-size:14px;padding:6px 12px;border-radius:6px;transition:background .2s}
nav a:hover{background:rgba(255,255,255,.15)}
nav .brand{font-weight:bold;font-size:18px;margin-right:20px}
nav .brand span{color:#d5f5e3}
nav .right{margin-left:auto;display:flex;align-items:center;gap:12px}
nav .right span{font-size:13px;opacity:.9}
.container{max-width:1200px;margin:24px auto;padding:0 16px}
.card{background:white;border-radius:12px;padding:20px;margin-bottom:16px;box-shadow:0 1px 4px rgba(0,0,0,.08)}
.card h2{font-size:18px;color:#2c3e50;margin-bottom:16px}
table{width:100%;border-collapse:collapse}
th,td{text-align:left;padding:10px 8px;border-bottom:1px solid #eee;font-size:13px}
th{color:#7f8c8d;font-weight:600;font-size:12px;text-transform:uppercase}
td{color:#2c3e50}
tr:hover{background:#f8f9fa}
.btn{display:inline-block;padding:8px 16px;border-radius:8px;font-size:13px;text-decoration:none;border:none;cursor:pointer;transition:opacity .2s}
.btn:hover{opacity:.85}
.btn-sm{padding:5px 10px;font-size:12px}
.btn-primary{background:#1abc9c;color:white}
.btn-danger{background:#e74c3c;color:white}
.btn-warning{background:#f39c12;color:white}
.btn-info{background:#3498db;color:white}
.btn-secondary{background:#95a5a6;color:white}
.form-group{margin-bottom:12px}
.form-group label{display:block;font-size:12px;color:#7f8c8d;margin-bottom:4px;font-weight:600;text-transform:uppercase}
.form-group input,.form-group select,.form-group textarea{width:100%;padding:10px 12px;border:1px solid #ddd;border-radius:8px;font-size:14px;transition:border .2s}
.form-group input:focus,.form-group select:focus,.form-group textarea:focus{outline:none;border-color:#1abc9c}
.form-row{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.badge{display:inline-block;padding:3px 8px;border-radius:12px;font-size:11px;font-weight:600}
.badge-success{background:#d5f5e3;color:#27ae60}
.badge-warning{background:#fef9e7;color:#f39c12}
.badge-danger{background:#fdedec;color:#e74c3c}
.badge-info{background:#d6eaf8;color:#2980b9}
.stats{display:grid;grid-template-columns:repeat(auto-fit,minmax(200px,1fr));gap:16px;margin-bottom:24px}
.stat-card{background:white;border-radius:12px;padding:20px;text-align:center;box-shadow:0 1px 4px rgba(0,0,0,.08)}
.stat-card .num{font-size:32px;font-weight:700;color:#2c3e50}
.stat-card .label{font-size:12px;color:#7f8c8d;text-transform:uppercase;margin-top:4px}
.stat-card .icon{font-size:24px;margin-bottom:8px}
.empty{text-align:center;padding:40px;color:#95a5a6;font-size:14px}
</style>
</head>
<body>
<nav>
  <div class="brand">SCRIPTIFY <span>V.02</span></div>
  <a href="/dashboard">Dashboard</a>
  <a href="/duenos">Due\u00f1os</a>
  <a href="/animales">Pacientes</a>
  <a href="/citas">Citas</a>
  <div class="right">
    <span>{{ doctor }}</span>
    <a href="/logout" style="background:rgba(255,255,255,.15);padding:6px 14px;">Salir</a>
  </div>
</nav>
<div class="container">
{% block content %}{% endblock %}
</div>
</body>
</html>
