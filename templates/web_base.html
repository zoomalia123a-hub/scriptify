<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>SCRIPTYFY - Sistema Veterinario</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
<style>
.stat-card{background:white;border-radius:12px;padding:20px;text-align:center;box-shadow:0 1px 4px rgba(0,0,0,.08);height:100%}
.stat-card .num{font-size:32px;font-weight:700;color:#2c3e50}
.stat-card .label{font-size:12px;color:#7f8c8d;text-transform:uppercase;margin-top:4px}
.stat-card .icon{font-size:24px;margin-bottom:8px}
.empty{text-align:center;padding:40px;color:#95a5a6;font-size:14px}
.navbar-custom{background:#1abc9c}
.navbar-custom .nav-link{color:rgba(255,255,255,.85)!important;border-radius:6px;padding:6px 12px;font-size:14px}
.navbar-custom .nav-link:hover,.navbar-custom .nav-link.active{background:rgba(255,255,255,.15);color:#fff!important}
.navbar-custom .navbar-brand{color:#fff;font-weight:700;font-size:18px}
.navbar-custom .navbar-brand span{color:#d5f5e3}
</style>
</head>
<body>
<nav class="navbar navbar-expand-lg navbar-custom">
  <div class="container-fluid">
    <span class="navbar-brand">SCRIPTIFY <span>V.02</span></span>
    <button class="navbar-toggler border-0" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav" aria-label="Menu">
      <span class="navbar-toggler-icon"></span>
    </button>
    <div class="collapse navbar-collapse" id="navbarNav">
      <ul class="navbar-nav me-auto mb-2 mb-lg-0">
        <li class="nav-item"><a class="nav-link" href="/dashboard">Dashboard</a></li>
        <li class="nav-item"><a class="nav-link" href="/duenos">Due&ntilde;os</a></li>
        <li class="nav-item"><a class="nav-link" href="/animales">Pacientes</a></li>
        <li class="nav-item"><a class="nav-link" href="/citas">Citas</a></li>
        {% if rol == 'admin' %}
        <li class="nav-item dropdown">
          <a class="nav-link dropdown-toggle" href="#" role="button" data-bs-toggle="dropdown">Admin</a>
          <ul class="dropdown-menu">
            <li><a class="dropdown-item" href="/reportes">Reportes</a></li>
            <li><a class="dropdown-item" href="/productos">Productos</a></li>
            <li><a class="dropdown-item" href="/ventas">Ventas</a></li>
          </ul>
        </li>
        {% endif %}
      </ul>
      <div class="d-flex align-items-center gap-2 mt-2 mt-lg-0 flex-wrap">
        <span class="text-white" style="font-size:13px;opacity:.9">{{ doctor }}{% if rol == 'admin' %} (Admin){% endif %}</span>
        <a href="/logout" class="btn btn-sm text-white px-3" style="background:rgba(255,255,255,.15)">Salir</a>
      </div>
    </div>
  </div>
</nav>
<div class="container-fluid py-3 px-3 px-lg-4">
{% block content %}{% endblock %}
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
