<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Tomar Foto</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
<style>
body{background:#2c3e50;display:flex;min-height:100vh;align-items:center;justify-content:center;padding:16px;font-family:'Segoe UI',Arial,sans-serif}
.camara-btn{width:100%;padding:40px 20px;font-size:18px;border:3px dashed #3498db;border-radius:16px;background:#ebf5fb;color:#3498db;cursor:pointer;margin:16px 0;display:block;text-decoration:none;transition:.2s;text-align:center}
.camara-btn:hover{background:#d4e6f1}
.camara-icono{font-size:48px;display:block;margin-bottom:8px}
</style>
</head>
<body>
<div class="card shadow border-0 rounded-4 text-center" style="max-width:380px;width:100%">
  <div class="card-body">
    <h5 class="fw-bold">Foto de {{ animal.nombre }}</h5>
    <p class="text-muted small">Tome o seleccione una foto</p>
    {% if error %}
    <div class="alert alert-danger py-2 small">{{ error }}</div>
    {% endif %}
    <form method="POST" enctype="multipart/form-data" id="formFoto" action="/subir_foto/{{ animal.id }}">
      <input type="file" name="foto" accept="image/*" capture="environment" id="inputFoto" style="display:none;">
      <label for="inputFoto" id="camaraLabel">
        <div class="camara-btn">
          <span class="camara-icono">&#128247;</span>
          Tocar para abrir c&aacute;mara
        </div>
      </label>
      <div class="text-primary small d-none mb-2" id="loading">Subiendo foto, espere...</div>
      <button class="btn w-100 py-2 fw-bold text-white border-0 mb-1" style="background:#3498db" type="submit" id="btnSubmit">Subir Foto</button>
    </form>
    <a href="/consulta/{{ animal.id }}" class="btn btn-outline-secondary w-100" id="btnCancel">Cancelar</a>
  </div>
</div>
<script>
var input = document.getElementById('inputFoto');
var loading = document.getElementById('loading');
var btnSubmit = document.getElementById('btnSubmit');
var camLabel = document.getElementById('camaraLabel');

input.addEventListener('change', function(){
  if (this.files && this.files.length > 0) {
    loading.classList.remove('d-none');
    btnSubmit.style.display = 'none';
    camLabel.style.display = 'none';
    document.getElementById('formFoto').submit();
  }
});
</script>
</body>
</html>
