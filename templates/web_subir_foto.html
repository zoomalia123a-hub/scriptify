<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<title>Tomar Foto</title>
<style>
* { box-sizing:border-box; margin:0; padding:0; }
body { font-family:'Segoe UI',Arial,sans-serif; background:#2c3e50; display:flex; min-height:100vh; align-items:center; justify-content:center; padding:16px; }
.card { background:white; border-radius:16px; box-shadow:0 4px 20px rgba(0,0,0,.3); padding:32px 24px; width:100%; max-width:380px; text-align:center; }
.camara-btn { width:100%; padding:40px 20px; font-size:18px; border:3px dashed #3498db; border-radius:16px; background:#ebf5fb; color:#3498db; cursor:pointer; margin:16px 0; display:block; text-decoration:none; transition:.2s; }
.camara-btn:hover { background:#d4e6f1; }
.camara-icono { font-size:48px; display:block; margin-bottom:8px; }
.sub { color:#7f8c8d; font-size:13px; margin-bottom:4px; }
h1 { font-size:18px; color:#2c3e50; margin-bottom:4px; }
.loading { display:none; color:#3498db; font-size:14px; margin-top:12px; padding:10px; }
.btn { width:100%; padding:12px; font-size:14px; border:none; border-radius:8px; font-weight:bold; cursor:pointer; text-decoration:none; display:block; }
.btn-primary { background:#3498db; color:white; margin-top:10px; }
.btn-secondary { background:#95a5a6; color:white; margin-top:8px; }
</style>
</head>
<body>
<div class="card">
<h1>Foto de {{ animal.nombre }}</h1>
<div class="sub">Tome o seleccione una foto</div>
{% if error %}
<div style="color:#e74c3c;font-size:13px;margin-bottom:10px;padding:8px;background:#fdedec;border-radius:6px;">{{ error }}</div>
{% endif %}
<form method="POST" enctype="multipart/form-data" id="formFoto" action="/subir_foto/{{ animal.id }}">
<input type="file" name="foto" accept="image/*" capture="environment" id="inputFoto" style="display:none;">
<label for="inputFoto" id="camaraLabel">
  <div class="camara-btn">
    <span class="camara-icono">📷</span>
    Tocar para abrir camara
  </div>
</label>
<div class="loading" id="loading">Subiendo foto, espere...</div>
<button class="btn btn-primary" type="submit" id="btnSubmit">Subir Foto</button>
</form>
<a href="/consulta/{{ animal.id }}" class="btn btn-secondary" id="btnCancel">Cancelar</a>
</div>
<script>
var input = document.getElementById('inputFoto');
var loading = document.getElementById('loading');
var btnSubmit = document.getElementById('btnSubmit');
var camLabel = document.getElementById('camaraLabel');

input.addEventListener('change', function(){
  if (this.files && this.files.length > 0) {
    loading.style.display = 'block';
    btnSubmit.style.display = 'none';
    camLabel.style.display = 'none';
    document.getElementById('formFoto').submit();
  }
});
</script>
</body>
</html>
