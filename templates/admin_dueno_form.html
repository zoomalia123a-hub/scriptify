{% extends "admin_base.html" %}
{% block content %}
<div class="card" style="max-width:500px;margin:0 auto">
  <h2 style="margin-bottom:16px"><i class="fas fa-user-edit" style="color:var(--primary)"></i> {{ 'Editar' if item else 'Nuevo' }} Due&ntilde;o</h2>
  <form method="POST">
    <div class="form-group"><label>DNI <span id="dniStatus" style="display:none;font-size:11px;margin-left:6px"></span></label><input name="dni" id="dniInput" value="{{ item.dni or '' }}" style="width:100%;padding:10px 12px;border:2px solid #e0e0e0;border-radius:8px;font-size:14px" onkeyup="buscarDuenoDni(event)"></div>
    <div class="form-group"><label>Nombre *</label><input name="nombre" id="nombreInput" value="{{ item.nombre or '' }}" required style="width:100%;padding:10px 12px;border:2px solid #e0e0e0;border-radius:8px;font-size:14px"></div>
    <div class="form-group"><label>Tel&eacute;fono</label><input name="telefono" id="telefonoInput" value="{{ item.telefono or '' }}" style="width:100%;padding:10px 12px;border:2px solid #e0e0e0;border-radius:8px;font-size:14px"></div>
    <div class="form-group"><label>Email</label><input name="email" id="emailInput" value="{{ item.email or '' }}" style="width:100%;padding:10px 12px;border:2px solid #e0e0e0;border-radius:8px;font-size:14px"></div>
    <div class="form-group"><label>Direcci&oacute;n</label><input name="direccion" id="direccionInput" value="{{ item.direccion or '' }}" style="width:100%;padding:10px 12px;border:2px solid #e0e0e0;border-radius:8px;font-size:14px"></div>
    <div style="display:flex;gap:8px;margin-top:16px">
      <button type="submit" class="btn btn-success" style="flex:1">Guardar Cambios</button>
      <a href="/duenos" class="btn btn-secondary" style="flex:1;text-align:center;text-decoration:none">Cancelar</a>
    </div>
  </form>
</div>
<script src="/static/razas.js"></script>
<script>
var dniTimeout;
function buscarDuenoDni(e){
  if(e.which===9)return;
  clearTimeout(dniTimeout);
  dniTimeout=setTimeout(function(){dnibuscar('dniInput','dniStatus','nombreInput','direccionInput','telefonoInput')},400);
}
</script>
{% endblock %}
