<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>SCRIPTYFY - Acceso</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
<style>
body{background:#1a1a2e;min-height:100vh;display:flex;align-items:center;justify-content:center;padding:16px}
.card-login{background:rgba(255,255,255,.95);border-radius:16px;box-shadow:0 8px 32px rgba(0,0,0,.4);padding:28px 24px;width:100%;max-width:400px;backdrop-filter:blur(4px)}
.logo{font-size:40px;text-align:center;margin-bottom:8px}
.card-login h1{font-size:22px;color:#2c3e50;text-align:center;margin-bottom:2px}
.card-login .sub{color:#7f8c8d;font-size:13px;text-align:center;margin-bottom:16px}
</style>
</head>
<body>
<div class="card-login">
  <div class="logo">&#128054;</div>
  <h1>SCRIPTYFY</h1>
  <div class="sub">Sistema de Gesti&oacute;n Veterinaria</div>
  <ul class="nav nav-pills nav-fill mb-3 border rounded overflow-hidden" role="tablist">
    <li class="nav-item" role="presentation">
      <button class="nav-link active rounded-0 fw-semibold" style="color:#1abc9c" id="tab-doctor-btn" data-bs-toggle="pill" data-bs-target="#tab-doctor" type="button" role="tab">Doctor</button>
    </li>
    <li class="nav-item" role="presentation">
      <button class="nav-link rounded-0 fw-semibold" style="color:#1abc9c" id="tab-admin-btn" data-bs-toggle="pill" data-bs-target="#tab-admin" type="button" role="tab">Admin</button>
    </li>
  </ul>
  {% if error %}<div class="alert alert-danger py-2 small text-center mb-3">{{ error }}</div>{% endif %}
  <div class="tab-content">
    <div class="tab-pane fade show active" id="tab-doctor" role="tabpanel">
      <form method="POST" action="/login">
        <select name="doctor" required class="form-select mb-3">
          <option value="">Selecciona tu nombre...</option>
          {% for d in doctores %}
          <option value="{{ d }}">{{ d }}</option>
          {% endfor %}
        </select>
        <button class="btn w-100 py-2 fw-bold text-white border-0" style="background:#1abc9c" type="submit">Ingresar como Doctor</button>
      </form>
    </div>
    <div class="tab-pane fade" id="tab-admin" role="tabpanel">
      <form method="POST" action="/admin_login">
        <div class="mb-3">
          <input name="username" placeholder="Usuario" required class="form-control">
        </div>
        <div class="mb-3">
          <input name="password" type="password" placeholder="Contrase&ntilde;a" required class="form-control">
        </div>
        <button class="btn w-100 py-2 fw-bold text-white border-0" style="background:#1abc9c" type="submit">Ingresar como Admin</button>
      </form>
    </div>
  </div>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script>
document.getElementById('tab-doctor-btn').addEventListener('click',function(){this.style.color='#fff';document.getElementById('tab-admin-btn').style.color='#1abc9c'});
document.getElementById('tab-admin-btn').addEventListener('click',function(){this.style.color='#fff';document.getElementById('tab-doctor-btn').style.color='#1abc9c'});
</script>
</body>
</html>
