<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<title>Acceso Doctor</title>
<style>
* { box-sizing:border-box; margin:0; padding:0; }
body { font-family:'Segoe UI',Arial,sans-serif; background:#f0f4f8; display:flex; min-height:100vh; align-items:center; justify-content:center; padding:16px; }
.card { background:white; border-radius:12px; box-shadow:0 2px 12px rgba(0,0,0,.1); padding:24px; width:100%; max-width:380px; }
h1 { font-size:20px; color:#2c3e50; margin-bottom:20px; text-align:center; }
select,button { width:100%; padding:14px; font-size:16px; border-radius:8px; margin-bottom:12px; }
select { border:1px solid #ddd; background:white; }
.btn { background:#3498db; color:white; border:none; font-weight:bold; cursor:pointer; }
.btn:hover { background:#2980b9; }
.error { color:#e74c3c; font-size:13px; text-align:center; margin-bottom:10px; }
</style>
</head>
<body>
<div class="card">
<h1>🔬 SCRIPTYFY</h1>
<p style="text-align:center;color:#555;margin-bottom:16px;">Acceso para Doctores</p>
<form method="POST" action="/login">
<select name="doctor" required>
<option value="">Selecciona tu nombre...</option>
{% for d in doctores %}
<option value="{{ d }}">{{ d }}</option>
{% endfor %}
</select>
<button class="btn" type="submit">Ingresar</button>
</form>
{% if error %}<div class="error">{{ error }}</div>{% endif %}
</div>
</body>
</html>
