{% extends "web_base.html" %}
{% block content %}
<div class="card" style="max-width:600px;margin:0 auto">
  <h2>Nueva Cita</h2>
  <form method="POST">
    <div class="form-group">
      <label>Paciente</label>
      <select name="id_animal" required>
        {% for a in animales %}
        <option value="{{ a.id }}" data-dueno="{{ a.id_dueno }}">{{ a.nombre }} ({{ a.dueno_nombre }})</option>
        {% endfor %}
      </select>
    </div>
    <div class="form-group">
      <label>ID Due\u00f1o</label>
      <input name="id_dueno" id="id_dueno" readonly required style="background:#f5f5f5">
    </div>
    <div class="form-row">
      <div class="form-group">
        <label>Fecha</label>
        <input name="fecha" type="date" value="{{ hoy }}" required>
      </div>
      <div class="form-group">
        <label>Tipo</label>
        <select name="tipo">
          <option value="veterinaria">Veterinaria</option>
          <option value="grooming">Grooming</option>
          <option value="cirugia">Cirug\u00eda</option>
        </select>
      </div>
    </div>
    <div class="form-group">
      <label>Motivo</label>
      <textarea name="motivo" rows="3" required></textarea>
    </div>
    <div class="form-group">
      <label>Precio (S/)</label>
      <input name="precio" type="number" step="0.01" value="0">
    </div>
    <div style="display:flex;gap:8px;margin-top:16px">
      <button type="submit" class="btn btn-primary">Guardar</button>
      <a href="/citas" class="btn btn-secondary">Cancelar</a>
    </div>
  </form>
</div>
<script>
document.querySelector('[name="id_animal"]').addEventListener('change', function(){
  var opt = this.options[this.selectedIndex];
  document.getElementById('id_dueno').value = opt.getAttribute('data-dueno');
});
document.querySelector('[name="id_animal"]').dispatchEvent(new Event('change'));
</script>
{% endblock %}
