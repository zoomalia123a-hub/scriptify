<!DOCTYPE html>
<html lang="es">
<head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>Error {{ code }}</title>
<style>
body{font-family:'Segoe UI',Arial,sans-serif;background:#f0f4f8;display:flex;align-items:center;justify-content:center;min-height:100vh;margin:0;padding:20px}
.card{background:white;border-radius:12px;box-shadow:0 2px 10px rgba(0,0,0,.1);padding:40px;text-align:center;max-width:400px}
h1{font-size:60px;color:#e74c3c;margin:0}
p{color:#7f8c8d;margin:12px 0 20px}
a{background:#3498db;color:white;padding:10px 24px;border-radius:8px;text-decoration:none;font-weight:bold;display:inline-block}
</style>
</head>
<body>
<div class="card">
<h1>{{ code }}</h1>
<p>{{ message }}</p>
<a href="/">Volver al inicio</a>
</div>
</body>
</html>
