<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Agregar Insumos</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
<style>
body{background:#f0f4f8;min-height:100vh;padding:12px;font-family:'Segoe UI',Arial,sans-serif}
</style>
</head>
<body>
<div class="container-fluid px-0" style="max-width:600px;margin:0 auto">
  <div class="card shadow-sm border-0 rounded-3">
    <div class="card-body">
      <h5 class="fw-bold mb-1">Agregar Insumos</h5>
      <div class="text-muted small mb-2">
        Paciente: <strong>{{ registro.animal_nombre }}</strong> |
        Due&ntilde;o: {{ registro.dueno_nombre }} |
        Fecha: {{ registro.fecha }} {{ registro.hora or '' }}
      </div>
      <div class="d-flex justify-content-between small text-muted mb-2">
        <span>Diagn&oacute;stico:</span><span>{{ registro.diagnostico or '' }}</span>
      </div>
      <form method="POST" action="/guardar_insumos/{{ registro.id }}">
        <div id="insumosContainer">
          <div class="row g-2 mb-2 align-items-center">
            <div class="col-8">
              <select name="insumo_id" class="form-select form-select-sm">
                <option value="">-- Seleccionar --</option>
                {% for p in productos %}
                <option value="{{ p.id }}">{{ p.nombre }} (stock: {{ p.stock }})</option>
                {% endfor %}
              </select>
            </div>
            <div class="col-4">
              <input type="number" name="insumo_cant" class="form-control form-control-sm" placeholder="Cant" min="1" value="1">
            </div>
          </div>
        </div>
        <button type="button" class="btn btn-outline-primary btn-sm w-100 mb-2" onclick="agregar()">+ Agregar otro</button>
        <button class="btn w-100 py-2 fw-bold text-white border-0 mb-1" style="background:#e67e22" type="submit">Guardar Insumos</button>
        <a href="/pendientes_insumos" class="btn btn-outline-secondary w-100">Volver a pendientes</a>
      </form>
    </div>
  </div>
</div>
<script>
function agregar(){
  var c=document.getElementById('insumosContainer');
  var t=c.querySelector('.row');
  var cl=t.cloneNode(true);
  cl.querySelector('select').value='';
  cl.querySelector('input').value='1';
  c.appendChild(cl);
}
</script>
</body>
</html>
