{% extends "base.html" %}

{% block content %}
<div class="form-card">
    <h2>{{ 'Editar' if dueno else 'Nuevo' }} Dueño</h2>
    <p class="subtitulo">{{ 'Modifica los datos del dueño' if dueno else 'Registra un nuevo dueño en el sistema' }}</p>

    <form method="POST">
        <div class="form-group">
            <label>Nombre completo</label>
            <input type="text" name="nombre" value="{{ dueno.nombre if dueno else '' }}" required>
        </div>
        <div class="form-group">
            <label>Teléfono</label>
            <input type="text" name="telefono" value="{{ dueno.telefono if dueno else '' }}" required>
        </div>
        <div class="form-group">
            <label>Email</label>
            <input type="email" name="email" value="{{ dueno.email if dueno else '' }}">
        </div>
        <div class="form-group">
            <label>Dirección</label>
            <input type="text" name="direccion" value="{{ dueno.direccion if dueno else '' }}">
        </div>
        <div style="display:flex; gap:0.5rem;">
            <button type="submit" class="btn btn-success">{{ 'Actualizar' if dueno else 'Guardar' }}</button>
            <a href="{{ url_for('listar_duenos') }}" class="btn btn-secondary">Cancelar</a>
        </div>
    </form>
</div>
{% endblock %}
