{% extends "web_base.html" %}
{% block content %}
<div class="stats">
  <div class="stat-card">
    <div class="icon">👤</div>
    <div class="num">{{ total_duenos }}</div>
    <div class="label">Due\u00f1os</div>
  </div>
  <div class="stat-card">
    <div class="icon">🐾</div>
    <div class="num">{{ total_animales }}</div>
    <div class="label">Pacientes</div>
  </div>
  <div class="stat-card">
    <div class="icon">📅</div>
    <div class="num">{{ citas_hoy }}</div>
    <div class="label">Citas Hoy</div>
  </div>
  <div class="stat-card">
    <div class="icon">🩺</div>
    <div class="num">{{ consultas_hoy }}</div>
    <div class="label">Consultas Hoy</div>
  </div>
</div>

<div style="display:grid;grid-template-columns:1fr 1fr;gap:16px">
  <a href="/pacientes" class="btn btn-primary" style="text-align:center;padding:20px;font-size:16px">👨‍⚕️ Atenci\u00f3n M\u00e9dica</a>
  <a href="/cobros" class="btn btn-warning" style="text-align:center;padding:20px;font-size:16px">💰 Cobros Pendientes</a>
  <a href="/mis_consultas" class="btn btn-info" style="text-align:center;padding:20px;font-size:16px">📋 Mis Consultas</a>
  <a href="/duenos" class="btn btn-secondary" style="text-align:center;padding:20px;font-size:16px">👥 Registrar Due\u00f1o</a>
</div>
{% endblock %}
