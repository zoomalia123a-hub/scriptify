<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<meta http-equiv="Pragma" content="no-cache">
<meta http-equiv="Expires" content="0">
<title>Test DNI</title>
</head>
<body style="font-family:sans-serif;padding:20px">
<h2>Prueba de consulta DNI</h2>
<p>Escribe 8 dígitos y presiona "Buscar"</p>
<input id="dni" maxlength="8" style="font-size:20px;padding:10px;width:200px">
<button onclick="buscar()" style="font-size:18px;padding:10px;margin:10px">Buscar</button>
<div id="resultado" style="margin-top:15px;font-size:16px;padding:10px;background:#f5f5f5;border-radius:8px"></div>
<script>
function buscar(){
  var v=document.getElementById('dni').value.trim();
  var r=document.getElementById('resultado');
  if(v.length!=8){r.innerHTML='<span style="color:red">Debe tener 8 dígitos</span>';return}
  r.innerHTML='<span style="color:#856404">Buscando...</span>';
  var x=new XMLHttpRequest();
  x.onreadystatechange=function(){
    if(x.readyState==4){
      try{
        var d=JSON.parse(x.responseText);
        if(d.error){r.innerHTML='<span style="color:red">'+d.error+'</span>';return}
        r.innerHTML='<span style="color:green">✔ '+d.nombre+(d.apellido_paterno?' '+d.apellido_paterno:'')+(d.apellido_materno?' '+d.apellido_materno:'')+'</span>';
      }catch(e){r.innerHTML='<span style="color:red">Error: '+e.message+'</span>'}
    }
  };
  x.open('GET','/api/dni/'+v,true);
  x.send();
}
</script>
</body>
</html>
