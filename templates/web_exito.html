<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Consulta Guardada</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
<style>
body{background:#f0f4f8;display:flex;min-height:100vh;align-items:center;justify-content:center;padding:16px;font-family:'Segoe UI',Arial,sans-serif}
</style>
</head>
<body>
<div class="card shadow border-0 rounded-3 text-center" style="max-width:360px;width:100%">
  <div class="card-body">
    <div class="fs-1 mb-2">&#9989;</div>
    <h5 class="fw-bold">Consulta registrada</h5>
    <p class="text-muted small mb-1">Paciente: <strong>{{ paciente }}</strong></p>
    <div class="bg-light rounded p-2 mb-3 small text-start">
      {{ fecha }} {{ hora }}<br>
      {{ doctor }}<br>
      {{ diagnostico }}
    </div>
    <div class="d-grid gap-2">
      <a href="/agregar_insumos/{{ registro_id }}" class="btn text-white fw-bold" style="background:#e67e22">+ Agregar Insumos</a>
      <a href="/pendientes_insumos" class="btn text-white fw-bold" style="background:#3498db">Pendientes de hoy</a>
      <a href="/pacientes" class="btn btn-outline-secondary">Volver a pacientes</a>
      <a href="/consulta/{{ paciente_id }}" class="btn text-white fw-bold" style="background:#2ecc71">+ Otra consulta</a>
    </div>
  </div>
</div>
</body>
</html>
