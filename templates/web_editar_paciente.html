<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<meta http-equiv="Pragma" content="no-cache">
<meta http-equiv="Expires" content="0">
<title>Editar Paciente</title>
<style>
* { box-sizing:border-box; margin:0; padding:0; }
body { font-family:'Segoe UI',Arial,sans-serif; background:#f0f4f8; min-height:100vh; padding:12px; padding-bottom:80px; }
.header { background:white; border-radius:12px; box-shadow:0 1px 6px rgba(0,0,0,.08); padding:16px; margin-bottom:12px; }
.header h1 { font-size:18px; color:#2c3e50; margin-bottom:2px; }
.header span { color:#999; font-size:13px; }
.card { background:white; border-radius:10px; box-shadow:0 1px 5px rgba(0,0,0,.07); padding:14px; margin-bottom:10px; }
.card h2 { font-size:14px; color:#2c3e50; margin-bottom:8px; }
label { display:block; font-size:12px; font-weight:bold; color:#2c3e50; margin-bottom:2px; margin-top:8px; }
label:first-child { margin-top:0; }
input,select,textarea { width:100%; padding:10px 12px; font-size:14px; border:1px solid #ddd; border-radius:8px; font-family:inherit; background:white; }
.row2 { display:flex; gap:8px; }
.row2 > * { flex:1; min-width:0; }
.btn { width:100%; padding:14px; font-size:16px; border:none; border-radius:10px; font-weight:bold; cursor:pointer; margin-top:10px; text-decoration:none; display:block; text-align:center; }
.btn-primary { background:#2ecc71; color:white; }
.btn-secondary { background:#95a5a6; color:white; }
.btn-info { background:#3498db; color:white; }
.fixed-bottom { position:fixed; bottom:0; left:0; right:0; padding:12px; background:white; box-shadow:0 -2px 8px rgba(0,0,0,.1); }
</style>
</head>
<body>
<div class="header">
  <h1>Editar Paciente</h1>
  <span>Doctor: {{ doctor }}</span>
</div>

<form method="POST">
<div class="card">
  <h2>Datos de la Mascota</h2>
  <label>Nombre</label>
  <input name="nombre" value="{{ p.nombre }}" required>
  <div class="row2">
    <div><label>Especie</label>
      <select id="esp_edit" name="especie">
        <option value="Perro" {% if p.especie=='Perro' %}selected{% endif %}>Perro</option>
        <option value="Gato" {% if p.especie=='Gato' %}selected{% endif %}>Gato</option>
        <option value="Ave" {% if p.especie=='Ave' %}selected{% endif %}>Ave</option>
        <option value="Roedor" {% if p.especie=='Roedor' %}selected{% endif %}>Roedor</option>
        <option value="Conejo" {% if p.especie=='Conejo' %}selected{% endif %}>Conejo</option>
        <option value="Otro" {% if p.especie=='Otro' %}selected{% endif %}>Otro</option>
      </select>
      <input id="esp_edit_custom" name="especie" placeholder="Especificar especie..." style="display:none;width:100%;padding:10px 12px;border:1px solid #ddd;border-radius:8px;font-size:14px">
    </div>
    <div><label>Raza</label><input name="raza" value="{{ p.raza or '' }}"></div>
  </div>
  <div class="row2">
    <div><label>Sexo</label>
      <select name="sexo">
        <option value="">--</option>
        <option value="Macho" {% if p.sexo=='Macho' %}selected{% endif %}>Macho</option>
        <option value="Hembra" {% if p.sexo=='Hembra' %}selected{% endif %}>Hembra</option>
      </select>
    </div>
    <div><label>Color</label><input name="color" value="{{ p.color or '' }}"></div>
  </div>
  <div class="row2">
    <div><label>Edad (a&ntilde;os)</label><input type="number" name="edad" value="{{ p.edad or 0 }}"></div>
    <div><label>Peso (kg)</label><input type="number" step="0.1" name="peso" value="{{ p.peso or 0 }}"></div>
  </div>
  <label>Esterilizado</label>
  <select name="esterilizado">
    <option value="0" {% if not p.esterilizado %}selected{% endif %}>No</option>
    <option value="1" {% if p.esterilizado %}selected{% endif %}>S&iacute;</option>
  </select>
</div>

<div class="card">
  <h2>Datos del Due&ntilde;o</h2>
  <label>DNI</label>
  <input name="dueno_dni" value="{{ dueno.dni or '' }}" placeholder="DNI">
  <label>Nombre</label>
  <input name="dueno_nombre" value="{{ dueno.nombre or '' }}" required>
  <div class="row2">
    <div><label>Tel&eacute;fono</label><input name="dueno_telefono" value="{{ dueno.telefono or '' }}"></div>
    <div><label>Direcci&oacute;n</label><input name="dueno_direccion" value="{{ dueno.direccion or '' }}"></div>
  </div>
  <label>Email</label>
  <input name="dueno_email" value="{{ dueno.email or '' }}" type="email" placeholder="correo@ejemplo.com">
</div>

<div class="fixed-bottom">
  <button type="submit" class="btn btn-primary">Guardar Cambios</button>
</div>
</form>
<script>
function initOtro(selectId, inputId) {
  var sel=document.getElementById(selectId), inp=document.getElementById(inputId);
  if(!sel||!inp)return;
  function toggle(){
    var v=sel.value;
    if(v==='Otro'||v==='Otros'||v==='otro'||v==='otros'){
      sel.style.display='none'; inp.style.display='block'; inp.focus();
    }else{
      sel.style.display=''; inp.style.display='none'; inp.value='';
    }
  }
  sel.addEventListener('change', toggle); toggle();
}
initOtro('esp_edit','esp_edit_custom');
</script>
</body>
</html>
