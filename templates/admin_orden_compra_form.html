{% extends "admin_base.html" %}
{% block content %}
<style>
.oc-row{display:flex;gap:8px;margin-bottom:6px}
.oc-row select{flex:1;padding:8px;border:2px solid #e0e0e0;border-radius:8px;font-size:13px}
.oc-row input[type=number]{width:100px;padding:8px;border:2px solid #e0e0e0;border-radius:8px;font-size:13px;text-align:center}
</style>

<div class="card" style="max-width:800px">
<form method="POST">
  <div class="form-row">
    <div class="form-group"><label>Proveedor *</label>
      <select name="id_proveedor" required style="width:100%;padding:10px;border:2px solid #e0e0e0;border-radius:8px">
        <option value="">-- Seleccionar --</option>
        {% for p in proveedores %}<option value="{{ p.id }}">{{ p.nombre }}</option>{% endfor %}
      </select>
    </div>
    <div class="form-group"><label>Fecha</label><input type="date" name="fecha" value="{{ hoy }}"></div>
  </div>
  <div class="form-group"><label>Observaciones</label><textarea name="observaciones" rows="2"></textarea></div>

  <h3 style="font-size:14px;margin:16px 0 8px;color:var(--text)"><i class="fas fa-list"></i> Productos</h3>
  <div id="itemsContainer">
    <div class="oc-row item-row">
      <select name="producto_id">
        <option value="">-- Seleccionar producto --</option>
        {% for p in productos %}<option value="{{ p.id }}" data-precio="{{ p.precio_compra }}">{{ p.nombre }} (S/ {{ "%.2f"|format(p.precio_compra|float) }})</option>{% endfor %}
      </select>
      <input type="number" name="cantidad" value="1" min="1" placeholder="Cant">
      <input type="number" name="precio_unitario" value="0" step="0.01" placeholder="P.Unit">
    </div>
  </div>
  <button type="button" class="btn btn-sm btn-secondary" onclick="agregarFila()" style="margin-bottom:16px"><i class="fas fa-plus"></i> Agregar Producto</button>

  <div style="display:flex;gap:8px;margin-top:8px">
    <button type="submit" class="btn btn-success"><i class="fas fa-save"></i> Crear Orden</button>
    <a href="/ordenes-compra" class="btn btn-secondary">Cancelar</a>
  </div>
</form>
</div>

<script>
var rowCount=1;
function agregarFila(){
  var c=document.getElementById('itemsContainer');
  var original=c.querySelector('.item-row');
  var clone=original.cloneNode(true);
  clone.querySelectorAll('select,input').forEach(function(el){
    el.name=el.name.replace(/_\d+$/,'_'+rowCount);
  });
  c.appendChild(clone);rowCount++;
  actualizarPrecios();
}
document.addEventListener('change',function(e){
  if(e.target.matches('[name^="producto_id"]')){
    var row=e.target.closest('.item-row');
    var opt=e.target.options[e.target.selectedIndex];
    var pu=row.querySelector('[name^="precio_unitario"]');
    if(opt&&opt.value&&pu) pu.value=parseFloat(opt.getAttribute('data-precio')||0).toFixed(2);
  }
});
function actualizarPrecios(){
  document.querySelectorAll('.item-row').forEach(function(row){
    var sel=row.querySelector('[name^="producto_id"]');
    if(sel&&sel.value){
      var opt=sel.options[sel.selectedIndex];
      var pu=row.querySelector('[name^="precio_unitario"]');
      if(pu) pu.value=parseFloat(opt.getAttribute('data-precio')||0).toFixed(2);
    }
  });
}
</script>
{% endblock %}
