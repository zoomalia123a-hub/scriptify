{% extends "base.html" %}

{% block content %}
<div class="form-card">
    <h2>Nuevo Animal</h2>
    <p class="subtitulo">Registra una nueva mascota en el sistema</p>

    <form method="POST">
        <div class="form-group">
            <label>Nombre</label>
            <input type="text" name="nombre" required>
        </div>
        <div class="form-group">
            <label>Especie</label>
            <input type="text" name="especie" placeholder="Ej: Perro, Gato, Ave" required>
        </div>
        <div class="form-group">
            <label>Raza</label>
            <input type="text" name="raza" placeholder="Ej: Labrador, Persa">
        </div>
        <div class="form-group">
            <label>Edad (años)</label>
            <input type="number" name="edad" required>
        </div>
        <div class="form-group">
            <label>Peso (kg)</label>
            <input type="number" step="0.1" name="peso" required>
        </div>
        <div class="form-group">
            <label>Dueño</label>
            <select name="id_dueno" required>
                <option value="">Seleccione un dueño</option>
                {% for d in duenos %}
                <option value="{{ d.id }}">{{ d.nombre }}</option>
                {% endfor %}
            </select>
        </div>
        <div style="display:flex; gap:0.5rem;">
            <button type="submit" class="btn btn-success">Guardar</button>
            <a href="{{ url_for('listar_animales') }}" class="btn btn-secondary">Cancelar</a>
        </div>
    </form>
</div>
{% endblock %}
