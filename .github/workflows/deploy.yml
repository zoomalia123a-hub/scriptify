name: Auto Deploy
on:
  push:
    branches: [main]
jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger webhook
        run: |
          curl -s -X POST "http://167.71.23.101/webhook/deploy" \
            -H "X-Deploy-Token: ${{ secrets.DEPLOY_TOKEN }}" \
            -H "Content-Type: application/json" || echo "Webhook call failed (expected if server is restarting)"
